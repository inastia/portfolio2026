<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UX Design Portfolio</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/output.css" />

    <!-- Favicons -->
    <link rel="icon" href="/src/favicons/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/src/favicons/favicon-96x96.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/src/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/src/favicons/android-chrome-192x192.png"
    />
  </head>

  <body>
    <!-- Header section -->
    <header class="site-header">
      <div
        id="site-header"
        class="site-header-inner max-w-7xl mx-auto px-4 md:px-6 pt-6"
      >
        <nav class="site-nav">
          <!-- Logo -->
          <div>
            <a href="/" class="logo">
              <img
                src="/src/images/logo/logo.png"
                alt="Anastasia Bigun — UX/UI Designer"
                width="60"
                height="60"
              />
            </a>
          </div>

          <div>
            <!-- Hamburger / X -->
            <label class="nav-toggle-label">
              <span></span>
              <span></span>
              <span></span>
              <span class="sr-only">Toggle navigation</span>
            </label>

            <div class="nav-overlay"></div>

            <ul class="nav-menu">
              <li><a href="/">projects</a></li>
              <li><a href="/about">about</a></li>
              <li><a href="/contact">contact</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main content section -->
    <main>
      <div class="max-w-7xl mx-auto px-4">
        <section class="gap-8 max-w-7xl mx-auto px-4">
          <picture>
            <source
              media="(min-width: 1920px)"
              srcset="
                /src/images/profile/header-img-large.png  1x,
                /src/images/profile/header-img-xlarge.png 2x
              "
            />
            <source
              media="(min-width: 768px)"
              srcset="
                /src/images/profile/header-img-medium.png 1x,
                /src/images/profile/header-img-large.png  2x
              "
            />
            <img
              src="/src/images/profile/header-img-small.png"
              srcset="
                /src/images/profile/header-img-small.png  1x,
                /src/images/profile/header-img-medium.png 2x
              "
              alt="Header image"
              loading="lazy"
              class="w-full h-auto"
            />
          </picture>
        </section>

        <section>
          <!-- Cards section -->
          <div
            id="projects-grid"
            class="grid grid-cols-1 gap-6 sm:grid-cols-2"
          ></div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/js/includes.js"></script>
    <script type="module" src="/src/js/projects.js"></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
  <!-- Footer section -->
  <footer class="bg-white">
    <div
      class="max-w-7xl mx-auto px-4 py-12 mt-40 grid grid-cols-1 md:grid-cols-2 items-center gap-6 text-center md:text-left"
    >
      <h5>2026 ©  Anastasia Bigun. All Rights Reserved.</h5>
      <h5 class="md:text-right">
        Designed & built by me · HTML · Tailwind · JavaScript
      </h5>
    </div>
  </footer>
</html>
