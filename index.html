<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UX Design Portfolio</title>
    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/output.css" />
    <!-- Favicons -->
    <link rel="icon" href="/favicons/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/favicons/favicon-96x96.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/favicons/web-app-manifest-192x192.png"
    />
    <!-- Favicons End -->
  </head>

  <body>
    <!-- Header section -->
    <header class="site-header">
      <div
        id="site-header"
        class="site-header-inner max-w-7xl mx-auto px-4 md:px-6 pt-6"
      >
        <nav class="site-nav">
          <!-- Logo -->
          <div>
            <a href="/" class="logo">
              <img
                src="/src/images/logo/logo.png"
                alt="Anastasia Bigun — UX/UI Designer"
                width="60"
                height="60"
              />
            </a>
          </div>

          <div>
            <!-- Hamburger / X -->
            <label class="nav-toggle-label">
              <span></span>
              <span></span>
              <span></span>
              <span class="sr-only">Toggle navigation</span>
            </label>

            <div class="nav-overlay"></div>

            <ul class="nav-menu">
              <li><a href="/">projects</a></li>
              <li><a href="/about">about</a></li>
              <li><a href="/contact">contact</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main content section -->
    <main>
      <div class="max-w-7xl mx-auto px-4">
        <section class="flex flex-col md:flex-row items-center gap-8 px-4 py-4">
          <!-- HEADER TEXT COLUMN -->
          <div
            class="flex-1 flex flex-col py-8 md:py-0 text-center md:text-left"
          >
            <h2 class="text-6xl mb-8 text-emerald-900 font-bold">
              UX/UI Designer
            </h2>
            <h2 class="text-2xl font-light">
              Designing with insight, empathy, and a deep respect for how people
              actually work.
            </h2>
          </div>
          <!-- HEADER IMG COLUMN -->
          <div class="hidden md:flex flex-1 justify-end">
            <picture>
              <source
                media="(min-width: 1920px)"
                srcset="/src/images/profile/header-large.png"
              />
              <source
                media="(min-width: 768px)"
                srcset="/src/images/profile/header-medium.png"
              />
              <source
                media="(max-width: 767px)"
                srcset="/src/images/profile/header-medium.png"
              />
              <img
                src="/src/images/profile/header-medium.png"
                alt="Header half-image"
                class="w-full h-auto"
              />
            </picture>
          </div>
        </section>

        <section>
          <!-- Cards section -->
          <div
            id="projects-grid"
            class="flex flex-col gap-6 md:flex-row md:flex-wrap"
          ></div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/js/projects.js"></script>
    <script type="module" src="/src/js/main.js"></script>
  </body>
  <!-- Footer section -->
  <footer class="bg-white">
    <div
      class="max-w-7xl mx-auto px-4 py-12 mt-40 grid grid-cols-1 md:grid-cols-2 items-center gap-6 text-center md:text-left"
    >
      <h5>2026 ©  Anastasia Bigun. All Rights Reserved.</h5>
      <h5 class="md:text-right">
        Designed & built by me · HTML · Tailwind · JavaScript
      </h5>
    </div>
  </footer>
</html>
